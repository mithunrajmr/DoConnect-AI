spring.datasource.url=jdbc:h2:mem:doconnect_auth_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-secret-value-with-more-than-32-characters
app.jwt.expiration-minutes=60
app.notifications.internal-token=test-notification-token
