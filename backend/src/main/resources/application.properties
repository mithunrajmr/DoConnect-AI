spring.application.name=doconnect-ai

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/doconnect_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.notifications.allowed-origins=${NOTIFICATION_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.notifications.internal-token=${NOTIFICATION_INTERNAL_TOKEN}

app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
# app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
app.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:30}
app.gemini.temperature=${GEMINI_TEMPERATURE:0.35}
app.gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:1200}
