spring.datasource.url=jdbc:h2:mem:doconnect_chat_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-secret-value-with-more-than-32-characters
app.chat.allowed-origins=http://localhost:5173
app.chat.global-room-id=global
app.chat.history-default-limit=50
app.chat.history-max-limit=200
app.notifications.backend-url=http://localhost:8080
app.notifications.internal-token=test-notification-token
