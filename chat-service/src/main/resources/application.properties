spring.application.name=doconnect-chat-service
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server.port=${CHAT_SERVER_PORT:8090}

spring.datasource.url=${CHAT_DB_URL:jdbc:mysql://localhost:3306/doconnect_chat?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${CHAT_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${CHAT_DB_PASSWORD:${DB_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${CHAT_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET}
app.chat.allowed-origins=${CHAT_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.chat.global-room-id=${CHAT_GLOBAL_ROOM_ID:global}
app.chat.history-default-limit=${CHAT_HISTORY_DEFAULT_LIMIT:50}
app.chat.history-max-limit=${CHAT_HISTORY_MAX_LIMIT:200}
app.notifications.backend-url=${NOTIFICATION_BACKEND_URL:http://localhost:8080}
app.notifications.internal-token=${NOTIFICATION_INTERNAL_TOKEN}
